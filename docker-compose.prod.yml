services:
  redis:
    image: redis:7.4
    restart: unless-stopped
    env_file:
      - ${PROD_ENV_FILE:-.env.prod}
    command:
      - sh
      - -c
      - redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec --maxmemory-policy noeviction
    volumes:
      - neomango_redis_prod_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: neomango-backend:prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ${PROD_ENV_FILE:-.env.prod}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  neomango_redis_prod_data:
