name: Backend CI

on:
  pull_request:
    branches:
      - dev
      - main
      - 'release/**'
  push:
    branches:
      - dev
      - main
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    env:
      SPRING_PROFILES_ACTIVE: test
      ADMIN_BOOTSTRAP_ENABLED: 'false'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compile Java
        run: ./gradlew --no-daemon compileJava

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build Docker image
        run: docker build -t neomango-backend-ci .
