spring:
  datasource:
    url: jdbc:h2:mem:neomango-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

jwt:
  secret: neomango-test-jwt-secret-key-over-32-bytes
  access-token-validity-in-seconds: 1800
  refresh-token-validity-in-seconds: 1209600
