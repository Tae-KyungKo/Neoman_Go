spring:
  profiles:
    include: secret

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  access-token-validity-in-seconds: 1800
  refresh-token-validity-in-seconds: 1209600